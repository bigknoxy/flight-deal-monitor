{% extends "base.html" %}
{% set no_sidebar = true %}
{% block title %}{{ title }} - Flight Deal Monitor{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>✈ Deal Monitor</h1>
      <p>{{ subtitle }}</p>
    </div>
    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ action }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters" autocomplete="{{ password_autocomplete }}">
      </div>
      <button type="submit" class="btn btn-primary auth-btn">{{ submit_text }}</button>
    </form>
    <div class="auth-footer">{{ footer | safe }}</div>
  </div>
</div>
{% endblock %}
