version: '3.8'

services:
  app:
    build: .
    container_name: flight-deal-monitor
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config/app.yaml:/app/config/app.yaml:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - flight-monitor-network

networks:
  flight-monitor-network:
    driver: bridge